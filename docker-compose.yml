services:
  db:
    image: mysql:lts
    container_name: booking_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: booking_db
      MYSQL_USER: booking
      MYSQL_PASSWORD: bookingpass
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - booking_network

  web:
    build: .
    container_name: booking_web
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    volumes:
      - ./booking_system:/app
      - ./static:/app/static
      - ./templates:/app/templates
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - booking_network

volumes:
  dbdata:


networks:
  booking_network:
