services:
  db:
    image: mysql:lts
    container_name: booking_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: booking_db
      MYSQL_USER: booking
      MYSQL_PASSWORD: bookingpass
    ports:
      - "3306:3306"
    volumes:
      - ./dbdata:/var/lib/mysql:rw
    networks:
      - booking_network

  web:
    build: .
    container_name: booking_web
    command: bash -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    volumes:
      - ./booking_system:/app
      - ./static:/app/static
      - ./templates:/app/templates
    # web is reachable inside the compose network at port 8000; nginx will proxy external traffic
    depends_on:
      - db
    networks:
      - booking_network

  nginx:
    image: nginx:stable-alpine
    container_name: booking_nginx
    ports:
      - "80:80"
    volumes:
      - ./templates:/usr/share/nginx/html:ro
      - ./booking_system/staticfiles:/usr/share/nginx/html_static:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - booking_network

networks:
  booking_network:
